server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/seckill?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci
    username: seckill
    password: seckill
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: ${JWT_SECRET:ChangeMe_To_A_Long_Random_String_At_Least_32Chars}
    expireSeconds: 7200

seckill:
  stream:
    key: "stream:seckill:orders"
    dlqKey: "stream:seckill:orders:dlq"
    group: "g1"
    consumer: "c1"
  consumer:
    maxRetry: 5
  orderStatus:
    ttlSeconds: 3600
  cache:
    productTtlSeconds: 30
    nullTtlSeconds: 5
  rateLimit:
    perUserPerSecond: 5